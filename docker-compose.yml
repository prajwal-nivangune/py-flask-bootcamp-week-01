version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: hospital
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  flask:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env
volumes:
  postgres_data: